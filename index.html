<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Genesis</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>" />
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: auto; }
  body {
    background: #050113; /* pre-GL paint, matches space top of gradient */
    overflow-x: hidden;
  }
  #gl {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    touch-action: pan-y; /* keep vertical scroll on touch, we only read pointer for splats */
  }
  #scroll-space { height: 650vh; }
  /* Static CSS fallback when WebGL2/float rendering is unavailable */
  body.no-gl #gl { display: none; }
  body.no-gl {
    background: linear-gradient(
      to bottom,
      #050113 0%, #0a0824 10%,
      #0a1128 26%, #16294f 48%,
      #2b3a67 62%, #b96a8c 72%, #ff9e6b 78%,
      #6ab7f0 90%, #d9f1fe 100%
    );
    background-attachment: scroll;
    background-size: 100% 650vh;
  }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="scroll-space"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
